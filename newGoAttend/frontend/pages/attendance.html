<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Attendance - GoAttend</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3.0">
    <style>
        .login-tabs { display: flex; gap: 0; margin-bottom: 2rem; border-radius: 12px; overflow: hidden; border: 2px solid var(--highlight); }
        .login-tab { flex: 1; padding: 1rem 1.5rem; text-align: center; cursor: pointer; font-weight: 700; font-size: 1rem; letter-spacing: 0.5px; background: transparent; color: var(--text-muted); border: none; transition: all 0.3s ease; }
        .login-tab.active { background: var(--highlight); color: #fff; }
        .login-tab:hover:not(.active) { background: rgba(var(--highlight-rgb, 99,102,241), 0.1); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .pw-form { max-width: 400px; margin: 0 auto; }
        .pw-form .form-group { margin-bottom: 1.5rem; text-align: left; }
        .pw-form label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text); }
        .pw-form input { width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 1rem; transition: border-color 0.3s; }
        .pw-form input:focus { outline: none; border-color: var(--highlight); }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-core"></div>
        <div class="loader-text">Initializing Scanner...</div>
    </div>

    <header class="navbar">
        <a href="/" class="logo">GoAttend</a>
        <nav>
            <a href="/">Home</a>
            <a href="/register">Register</a>
            <a href="/attendance">Login</a>
            <a href="/students">Students</a>
            <button id="themeToggle" class="btn" style="padding:0.4rem; border:none; background:transparent; font-size:1.2rem; cursor:pointer;" title="Toggle Theme"></button>
        </nav>
    </header>

    <main class="container">
        <h2 class="page-title">Authentication Portal</h2>

        <div class="card" id="loginCard" style="text-align: center;">
            <!-- Tab Switcher -->
            <div class="login-tabs">
                <button class="login-tab active" data-tab="face" id="faceTab">👁️ Face Scan</button>
                <button class="login-tab" data-tab="pw" id="pwTab">🔑 Password Login</button>
            </div>

            <!-- ===== Face Login Tab ===== -->
            <div class="tab-panel active" id="facePanel">
                <p style="color: var(--text-muted); margin-bottom: 2rem; font-size:1.1rem;">
                    Align your face within the frame and initiate the biometric scan.
                </p>

                <div class="camera-wrapper" style="justify-content:center;">
                    <div class="camera-container" id="cameraBox" style="display:none;">
                        <video id="video" autoplay playsinline></video>
                        <div class="scanner-line"></div>
                        <canvas id="canvas"></canvas>
                    </div>
                </div>

                <div style="display:flex; gap:1rem; margin-top:2rem; justify-content:center; flex-wrap:wrap;">
                    <button class="btn btn-primary" id="startCameraBtn">
                        <span style="font-size:1.5rem">👁️</span> Initialize Optical Sensors
                    </button>
                    <button class="btn btn-success" id="loginBtn" style="display:none;">
                        <span style="font-size:1.5rem">⚡</span> Scan Face Data
                    </button>
                </div>
            </div>

            <!-- ===== Password Login Tab ===== -->
            <div class="tab-panel" id="pwPanel">
                <p style="color: var(--text-muted); margin-bottom: 2rem; font-size:1.1rem;">
                    Enter your Student ID and password to mark attendance.
                </p>
                <form class="pw-form" id="pwLoginForm">
                    <div class="form-group">
                        <label for="pwStudentId">Identification Ledger (Roll No)</label>
                        <input type="text" id="pwStudentId" placeholder="e.g. CS2024001" required>
                    </div>
                    <div class="form-group">
                        <label for="pwPassword">Access Code (Password)</label>
                        <input type="password" id="pwPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="pwSubmitBtn" style="width:100%;">
                        <span style="font-size:1.2rem">🔓</span> Authenticate & Mark Attendance
                    </button>
                </form>
            </div>

            <!-- Result (shared) -->
            <div id="resultBox" style="display:none; margin-top:2.5rem;"></div>
        </div>

        <!-- Recent attendance -->
        <div class="card">
            <h3 style="margin-bottom: 1rem;">Recent Attendance</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Name</th><th>Status</th><th>Time</th></tr>
                    </thead>
                    <tbody id="attendanceTable">
                        <tr><td colspan="3" style="text-align:center; color:var(--text-muted);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    <script src="/static/js/app.js?v=2.0"></script>
    <script src="/static/js/particles.js"></script>
    <script src="/static/js/magnetic-buttons.js"></script>
    <script src="/static/js/face-scan-overlay.js"></script>
    <script>
        // ===== Tab Switching =====
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
                // Hide previous result
                document.getElementById('resultBox').style.display = 'none';
            });
        });

        // ===== Face Login (existing flow) =====
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let stream = null;

        document.getElementById('startCameraBtn').addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 480, height: 360 }
                });
                video.srcObject = stream;
                document.getElementById('cameraBox').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'inline-flex';
                document.getElementById('startCameraBtn').textContent = '📷 Camera Active';
                document.getElementById('startCameraBtn').disabled = true;
            } catch (e) {
                showToast('Camera access denied', 'error');
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('loginBtn');
            const cameraBox = document.getElementById('cameraBox');
            
            btn.disabled = true;
            btn.innerHTML = `<span style="font-size:1.5rem">🔄</span> Verifying Biometrics...`;
            cameraBox.classList.add('scanning');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('photo', blob, 'login.jpg');

                try {
                    const res = await fetch('/api/face-login', { method: 'POST', body: fd });
                    const data = await res.json();
                    
                    cameraBox.classList.remove('scanning');
                    showLoginResult(data);
                } catch (err) {
                    cameraBox.classList.remove('scanning');
                    showToast(err.message || 'Network anomaly', 'error');
                }

                btn.disabled = false;
                btn.innerHTML = `<span style="font-size:1.5rem">⚡</span> Scan Face Data`;
            }, 'image/jpeg', 0.9);
        });

        // ===== Password Login =====
        document.getElementById('pwLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('pwSubmitBtn');
            const studentId = document.getElementById('pwStudentId').value.trim();
            const password = document.getElementById('pwPassword').value;

            if (!studentId || !password) {
                showToast('All fields are required', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span style="font-size:1.2rem">🔄</span> Verifying Credentials...';
            gsap.to(btn, { scale: 0.95, duration: 0.2, yoyo: true, repeat: -1 });

            try {
                const res = await fetch('/api/password-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: studentId, password: password })
                });
                const data = await res.json();

                gsap.killTweensOf(btn);
                btn.style.transform = 'scale(1)';

                if (!res.ok) {
                    showToast(data.error || 'Authentication failed', 'error');
                    showLoginResult({ matched: false, error: data.error || 'Invalid credentials' });
                } else {
                    showLoginResult(data);
                }
            } catch (err) {
                gsap.killTweensOf(btn);
                btn.style.transform = 'scale(1)';
                showToast(err.message || 'Network anomaly', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<span style="font-size:1.2rem">🔓</span> Authenticate & Mark Attendance';
        });

        // ===== Shared Result Display =====
        function showLoginResult(data) {
            const box = document.getElementById('resultBox');
            box.style.display = 'block';

            if (data.matched) {
                box.innerHTML = `
                    <div class="login-result" style="color:var(--success)">
                        <div class="icon-box" style="text-shadow: 0 0 30px var(--success)">✅</div>
                        <h3>Welcome, ${esc(data.student.name)}</h3>
                        <p style="color:var(--text)">[ ID: ${esc(data.student.student_id)} ]</p>
                        <p style="margin-top:0.5rem; color:var(--text-muted)">Attendance Authenticated at ${formatDate(data.attendance.timestamp)}</p>
                    </div>
                `;
                gsap.from(box, { scale: 0.8, opacity: 0, duration: 0.6, ease: "back.out(1.5)" });
                showToast(`Attendance confirmed for ${data.student.name}`, 'success');
                loadAttendance();
            } else {
                box.innerHTML = `
                    <div class="login-result" style="color:var(--danger)">
                        <div class="icon-box" style="text-shadow: 0 0 30px var(--danger)">❌</div>
                        <h3>Authorization Failed</h3>
                        <p style="color:var(--text)">${data.error || 'Identity not recognized.'}</p>
                    </div>
                `;
                gsap.from(".icon-box", { x: -20, duration: 0.1, yoyo: true, repeat: 5 });
                showToast('Verification failed', 'error');
            }
        }

        // ===== Attendance Table =====
        async function loadAttendance() {
            const tbody = document.getElementById('attendanceTable');
            try {
                const records = await apiGet('/attendance?limit=30');
                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">No records yet.</td></tr>';
                    return;
                }
                tbody.innerHTML = records.map(r => `
                    <tr>
                        <td><strong>${esc(r.name || r.student_id)}</strong></td>
                        <td><span class="badge badge-success">${esc(r.status)}</span></td>
                        <td>${formatDate(r.timestamp)}</td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="3" style="color:var(--danger);">${e.message}</td></tr>`;
            }
        }
        loadAttendance();
    </script>
</body>
</html>
